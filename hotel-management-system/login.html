<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link href="login_style.css" rel="stylesheet">
    <title>Hotel Management System</title>
</head>

<body class="flex-center">
    <main>
    <div class="loginform">
        <div class="header">
            <div class="flex-center">
                <svg class="hotel-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 22v-6.57"></path>
                    <path d="M12 11h.01"></path>
                    <path d="M12 7h.01"></path>
                    <path d="M14 15.43V22"></path>
                    <path d="M15 16a5 5 0 0 0-6 0"></path>
                    <path d="M16 11h.01"></path>
                    <path d="M16 7h.01"></path>
                    <path d="M8 11h.01"></path>
                    <path d="M8 7h.01"></path>
                    <rect x="4" y="2" width="16" height="20" rx="2"></rect>
                </svg>
            </div>
            <div class="text-center">
                <h4>International Hotel</h4>
                <small>Management System</small>
            </div>
        </div>
        <form id="signinform" class="flex-column">
            <div>
                <label for="role">Select Role</label>
                <select id="role" class="input-box">
                    <option>Super Admin</option>
                    <option>Receptionist</option>
                    <option>Accountant</option>
                </select>
            </div>
            <div>
                <label for="email">UserName</label>
                <div class="flex-row-start input-box">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <input id="email" name="email" class="input-box-next-to-icon" placeholder="Enter Your Email"
                        required autocomplete="email">
                </div>
            </div>
            <div>
                <label for="password">Password</label>
                <div class="flex-row-start input-box">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input id="password" name="password" type="password" class="input-box-next-to-icon"
                        placeholder="Enter Password" required autocomplete="current-password">
                </div>
            </div>
            <div>
                <button type="button" onclick="log()">Sign In</button>
            </div>
        </form>
    </div>
    </main>
    <footer class="text-center">
        <small lang="ar" dir="rtl">اعداد الطلاب:
            <br>
            1- حسين عبدالله حسين
            <br>
            2- احمد عبود غازي
            <br>
            3- ناصر عبداللطيف باعش
        </small>
    </footer>
    <script>
        function log() {
            const role = document.getElementById("role").value;
            if (role === "Super Admin") {
                window.location.href = "admin-dashboard.html";
            } else if (role === "Receptionist") {
                window.location.href = "receptionest-dashboard.html";
            } else if (role === "Accountant") {
                window.location.href = "accountant-dashboard.html";
            }
        }
    </script>
</body>

</html>
